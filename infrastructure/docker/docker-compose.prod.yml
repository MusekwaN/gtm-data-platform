version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: gtm_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: gtm_kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: gtm_kafka_ui
    depends_on: [kafka]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: gtm-platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    restart: unless-stopped

  ingestion:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.ingestion
    container_name: gtm_ingestion
    depends_on: [kafka]
    env_file: ../../.env
    restart: unless-stopped

  pipeline:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.pipeline
    container_name: gtm_pipeline
    depends_on: [kafka]
    env_file: ../../.env
    volumes:
      - ../../data:/app/data
    restart: unless-stopped

  metrics:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.pipeline
    container_name: gtm_metrics
    command: python monitoring/pipeline_metrics.py
    ports:
      - "8000:8000"
    volumes:
      - ../../data:/app/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: gtm_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../../monitoring/prometheus:/etc/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: gtm_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: gtm_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  grafana_data:
  n8n_data: